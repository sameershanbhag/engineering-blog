name: Deploy to Vercel

# Deploys the frontend to Vercel production on every push to main.
# One-time setup (tokens, project link, env vars) is documented in DEPLOY.md.

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

# Never run two production deploys at once; cancel the older one.
concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Verify required secrets
        run: |
          missing=()
          [ -z "$VERCEL_TOKEN" ] && missing+=("VERCEL_TOKEN")
          [ -z "$VERCEL_ORG_ID" ] && missing+=("VERCEL_ORG_ID")
          [ -z "$VERCEL_PROJECT_ID" ] && missing+=("VERCEL_PROJECT_ID")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing GitHub secret(s): ${missing[*]} — see DEPLOY.md to finish setup."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project + env (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (production)
        env:
          # Single source of truth: the repo variable NEXT_PUBLIC_API_URL
          # (Settings → Secrets and variables → Actions → Variables).
          PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          # NEXT_PUBLIC_* are inlined at BUILD time. `vercel pull` can return
          # them empty (masked), which silently drops the frontend to mock data,
          # so set the (public) API URL explicitly from the repo variable.
          if [ -z "$PUBLIC_API_URL" ]; then
            echo "::error::Repo variable NEXT_PUBLIC_API_URL is not set."
            exit 1
          fi
          touch .vercel/.env.production.local
          sed -i '/^NEXT_PUBLIC_API_URL=/d' .vercel/.env.production.local
          echo "NEXT_PUBLIC_API_URL=${PUBLIC_API_URL}" >> .vercel/.env.production.local
          vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to production
        run: |
          url="$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "Deployed: $url"
          echo "### ✅ Deployed to Vercel" >> "$GITHUB_STEP_SUMMARY"
          echo "$url" >> "$GITHUB_STEP_SUMMARY"
